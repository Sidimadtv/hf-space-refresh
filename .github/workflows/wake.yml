name: Wake Up & Dashboard

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ping and Build Dashboard
        run: |
          URLS=(
            "https://sidimadtv-pro-snrt.hf.space"
            "https://sidimadtv-pro-alkass.hf.space"
            "https://sidimadtv-pro-ksa.hf.space"
            "https://sidimadtv-pro-dubai.hf.space"
            "https://sidimadtv-cors-proxy.hf.space"
            "https://sidimadtv-cdrm.hf.space"
            "https://bysidimad-cdrm.hf.space"
            "https://sidim-mycdrm.hf.space"
            "https://sidim-core-proxy.hf.space"
          )
          
          # Force the timezone to Morocco/Casablanca for the dashboard display
          export TZ='Africa/Casablanca'
          LOCAL_TIME=$(date +"%Y-%m-%d %I:%M:%S %p")
          UTC_TIME=$(date -u +"%H:%M UTC")
          
          # Start HTML
          echo "<html><head><title>Spaces Status</title>" > index.html
          echo "<meta name='viewport' content='width=device-width, initial-scale=1'>" >> index.html
          echo "<meta http-equiv='refresh' content='300'>" >> index.html
          echo "<style>
            body{font-family:-apple-system,sans-serif; background:#0f172a; color:white; text-align:center; padding:20px;}
            .grid{display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin-top:20px;}
            .card{background:#1e293b; padding:20px; border-radius:12px; width:280px; border:1px solid #334155; transition: 0.3s;}
            .card:hover{border-color: #38bdf8;}
            .online{color:#4ade80; font-weight:bold; display:block; margin-bottom:10px;}
            .offline{color:#f87171; font-weight:bold; display:block; margin-bottom:10px;}
            .url{font-size:0.8em; color:#94a3b8; word-break:break-all; margin-bottom:15px; height: 35px; overflow: hidden;}
            .btn{display:inline-block; background:#38bdf8; color:#0f172a; padding:8px 15px; border-radius:6px; text-decoration:none; font-weight:bold; font-size:0.8em;}
            
            .heart-box{background:#1e293b; padding:15px; border-radius:50px; display:inline-flex; align-items:center; border:2px solid #ef4444; margin-bottom: 20px; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);}
            .heart {color: #ef4444; font-size: 1.5em; margin-right: 10px; animation: beat .8s infinite alternate;}
            @keyframes beat { to { transform: scale(1.1); } }
            .time-value{color:#ffffff; font-size:1.1em; font-weight:bold;}
            .utc-small{font-size:0.7em; color:#64748b; margin-top:4px;}
          </style>" >> index.html
          echo "</head><body>" >> index.html
          echo "<h1>🚀 Spaces Monitor</h1>" >> index.html
          
          # Updated Heartbeat Box with Local Time
          echo "<div class='heart-box'>" >> index.html
          echo "<span class='heart'>❤️</span>" >> index.html
          echo "<div><span style='font-size:0.7em; color:#94a3b8; display:block;'>LAST REFRESH</span>" >> index.html
          echo "<span class='time-value'>$LOCAL_TIME</span>" >> index.html
          echo "<span class='utc-small'>($UTC_TIME)</span></div>" >> index.html
          echo "</div>" >> index.html

          echo "<div class='grid'>" >> index.html

          for url in "${URLS[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$url")
            echo "<div class='card'>" >> index.html
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "<span class='online'>● ONLINE ($STATUS)</span>" >> index.html
            else
              echo "<span class='offline'>○ OFFLINE ($STATUS)</span>" >> index.html
            fi
            echo "<div class='url'>$url</div>" >> index.html
            echo "<a href='$url' target='_blank' class='btn'>Manual Handshake 🤝</a>" >> index.html
            echo "</div>" >> index.html
          done

          echo "</div><p style='margin-top:40px; color:#475569;'>Check heartbeat.txt for raw logs</p></body></html>" >> index.html
          
          # This writes the exact time to the file for GitHub to see a change
          echo "Last Ping: $LOCAL_TIME" > heartbeat.txt

      - name: Deploy and Keep Alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html heartbeat.txt
          # The commit message will also show the time in the GitHub history
          git commit -m "Refresh: $(date)" || echo "No changes"
          git push





