name: Wake Up Sports Spaces

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Crucial: This allows the bot to commit changes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Gets your files so it can update them

      - name: Ping Spaces
        run: |
          URLS=(
            "https://sidimadtv-pro-snrt.hf.space"
            "https://sidimadtv-pro-alkass.hf.space"
            "https://sidimadtv-pro-ksa.hf.space"
            "https://sidimadtv-pro-dubai.hf.space"
            "https://sidimadtv-cors-proxy.hf.space"
            "https://sidimadtv-cdrm.hf.space"
            "https://bysidimad-cdrm.hf.space"
            "https://sidim-mycdrm.hf.space"
            "https://sidim-core-proxy.hf.space"
          )
          for url in "${URLS[@]}"; do
            echo "Pinging: $url"
            curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$url"
          done

      - name: Keep Alive (Prevent 60-day pause)
        run: |
          date > heartbeat.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add heartbeat.txt
          git commit -m "Keep-alive: $(date)" || echo "No changes to commit"
          git push




